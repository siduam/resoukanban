name: 墨水屏综合看板推送

on:
  schedule:
    - cron: '47 * * * *'  # 每小时运行一次
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 添加这一行，允许推送代码
    steps:
      - name: 获取代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 获取完整历史，以便后续提交

      - name: 安装 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: pip install -r requirements.txt

      - name: 运行测试
        run: python -m unittest discover -s tests -v

      - name: 运行！生成图片并推送
        env:
          ZECTRIX_API_KEY: ${{ secrets.ZECTRIX_API_KEY }}
          ZECTRIX_MAC: ${{ secrets.ZECTRIX_MAC }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CAIYUN_API_TOKEN: ${{ secrets.CAIYUN_API_TOKEN }}
        run: python main.py

    
